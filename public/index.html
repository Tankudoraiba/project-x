<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resu-tan — Image Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/resutan.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">R</div>
      <h1>Resu-tan Image Tool</h1>
    </div>
  </header>

  <div class="container">
    <div class="main-col">
      <div id="drop">Drop files here or
        <label class="filepicker-label">choose files
          <input id="filepicker" type="file" multiple accept="image/*" />
        </label>
      </div>
      <div class="settings" style="margin-top:10px">
        <div class="small">Default preserve aspect: <input type="checkbox" id="defaultPreserve" checked></div>
        <div class="small">Default width: <input id="defaultWidth" size="6" placeholder="px" />
        Default height: <input id="defaultHeight" size="6" placeholder="px" />
        Default format: <select id="defaultFormat"><option value="png">png</option><option value="jpg">jpg</option><option value="webp">webp</option><option value="heic">heic</option></select>
        <button id="applyDefaults" style="margin-left:6px">Apply defaults to all</button></div>
      </div>

      <div id="files" style="margin-top:12px"></div>

      <div class="actions" style="margin-top:8px">
        <button id="process">Process All</button>
        <button id="downloadAll" class="secondary" style="margin-left:8px">Download All</button>
        <span id="status" class="muted" style="margin-left:12px"></span>
      </div>

      <div id="outputs"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
