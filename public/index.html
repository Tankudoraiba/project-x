<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resu-tan — Image Tool</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ff91b8'/%3E%3Cstop offset='100%25' stop-color='%237bd7ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='128' height='128' rx='28' fill='url(%23g)'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' dominant-baseline='middle' font-family='Poppins, Arial, sans-serif' font-weight='800' font-size='70' fill='%23fff'%3E%E3%83%AC%E3%82%B9%3C/text%3E%3C/svg%3E">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/resutan.css">
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo">レス</div>
      <h1>Resu-tan Image Tool</h1>
    </div>
  </header>

  <div class="container">
    <div class="main-col">
      <div id="drop">Drop files here or
        <label class="filepicker-label">choose files
          <input id="filepicker" type="file" multiple accept="image/*" />
        </label>
      </div>
      <div class="settings" style="margin-top:10px">
        <div class="small">Default preserve aspect: <input type="checkbox" id="defaultPreserve" checked></div>
        <div class="small">Default width: <input id="defaultWidth" size="6" placeholder="px" />
          Default height: <input id="defaultHeight" size="6" placeholder="px" />
          Default format: <div class="custom-select" data-idx="default">
            <button type="button" class="custom-select-trigger" id="defaultFormatTrigger">png</button>
            <div class="custom-options">
              <div class="custom-option selected" data-value="png">png</div>
              <div class="custom-option" data-value="jpg">jpg</div>
              <div class="custom-option" data-value="webp">webp</div>
              <div class="custom-option" data-value="heic">heic</div>
            </div>
            <input type="hidden" id="defaultFormat" class="format" data-idx="default" value="png" />
          </div>
          <button id="applyDefaults" style="margin-left:6px">Apply defaults to all</button>
        </div>
      </div>

      <div id="files" style="margin-top:12px"></div>

      <div class="actions" style="margin-top:8px">
        <button id="process">Process All</button>
        <button id="downloadAll" class="secondary" style="margin-left:8px">Download All</button><br>
        <span id="status" class="muted" style="margin-left:12px"></span>
      </div>

      <div id="outputs"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
