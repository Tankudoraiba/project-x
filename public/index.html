<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Image Tool</title>
  <style>
    body{font-family:Arial;margin:20px}
    #drop{border:2px dashed #999;padding:20px;text-align:center}
    .file{border:1px solid #ddd;padding:8px;margin:8px}
    #outputs{margin-top:20px}
    .output{padding:6px;border:1px solid #ccc;margin:6px}
  </style>
</head>
<body>
  <h1>Simple Image Tool</h1>
  <div id="drop">Drop files here or <input id="filepicker" type="file" multiple></div>
  <div style="margin-top:8px">Default preserve aspect: <input type="checkbox" id="defaultPreserve" checked></div>
  <div id="files"></div>
  <button id="process">Process All</button>
  <button id="downloadAll" style="margin-left:8px">Download All</button>

  <div id="outputs"></div>
  <script src="/app.js"></script>
</body>
</html>
